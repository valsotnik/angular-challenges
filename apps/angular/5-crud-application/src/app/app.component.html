<section class="page">
  <h1>Todos</h1>

  <ul class="todo-list">
    @for (todo of todos(); track todo.id) {
      <li class="todo-item">
        <div class="todo-content">
          <span class="todo-title">{{ todo.title }}</span>
          <span class="todo-status">
            {{ todo.completed ? 'Completed' : 'Pending' }}
          </span>
        </div>

        <button type="button" (click)="updateTodo(todo)">
          Update
        </button>
      </li>
    }
  </ul>
</section>
