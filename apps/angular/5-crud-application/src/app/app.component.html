<section class="page">
  <h1>Todos</h1>

  @if (store.loading()) {
    <div class="loading-overlay" aria-live="polite" aria-busy="true">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  }

  @if (store.error(); as error) {
    <p role="alert">{{ error }}</p>
  }

  <ul class="todo-list">
    @for (todo of store.todos(); track todo.id) {
      <app-todo-item
        [todo]="todo"
        [processing]="store.isProcessing(todo.id)"
        (updateClicked)="store.updateTodo($event)"
        (deleteClicked)="store.deleteTodo($event.id)"
      />
    }
  </ul>
</section>
